events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream catalog {
        server catalogservice:8080;
    }

    upstream ai {
        server aiservice:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Catalog API
        location /catalog/ {
            proxy_pass http://catalog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI Service API
        location /api/ {
            proxy_pass http://ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Convenience: /seed → catalog
        location = /seed {
            proxy_pass http://catalog/seed;
            proxy_set_header Host $host;
        }

        # Convenience: /embeddings/* → ai
        location /embeddings/ {
            proxy_pass http://ai/embeddings/;
            proxy_set_header Host $host;
        }

        # Health checks
        location /health {
            proxy_pass http://ai/health;
            proxy_set_header Host $host;
        }

        location /catalog/health {
            proxy_pass http://catalog/health;
            proxy_set_header Host $host;
        }

        # Root location - serve Angular frontend (must be last)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
