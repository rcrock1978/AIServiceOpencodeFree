services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: aishop-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: aivector
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aiPass123
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiuser -d aivector"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aishop-net

  ollama:
    image: ollama/ollama:latest
    container_name: aishop-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - aishop-net

  catalogservice:
    build:
      context: ./CatalogService
      dockerfile: Dockerfile
    container_name: aishop-catalogservice
    ports:
      - "8010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PgVector: Host=pgvector;Port=5432;Database=aivector;Username=aiuser;Password=aiPass123
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - aishop-net

  aiservice:
    build:
      context: ./AiService
      dockerfile: Dockerfile
    container_name: aishop-aiservice
    ports:
      - "8090:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PgVector: Host=pgvector;Port=5432;Database=aivector;Username=aiuser;Password=aiPass123
      Ollama__BaseUrl: http://ollama:11434
      AI__Provider: Ollama
    depends_on:
      pgvector:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - aishop-net

  nginx:
    image: nginx:alpine
    container_name: aishop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Client/dist:/usr/share/nginx/html:ro
    depends_on:
      - catalogservice
      - aiservice
    networks:
      - aishop-net

volumes:
  pgvector_data:
  ollama_data:

networks:
  aishop-net:
    driver: bridge
